<!DOCTYPE html>
<html lang="en">
   <head>
     <meta charset="utf-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
     <meta name="theme-color" content="#000000" />
     <meta name="description" content="A dashboard for CarX Street — suspension calculator, gearbox tuning, and more" />
    <meta property="og:title" content="GearX" />
    <meta property="og:description" content="A dashboard for CarX Street — suspension calculator, gearbox tuning, and more" />
    <meta property="og:type" content="website" />
    <title>GearX</title>
    <!-- Inline script to prevent FOUC (Flash of Unstyled Content) -->
    <script>
      (function() {
        var STORAGE_KEY = 'gearx-theme';
        var saved = localStorage.getItem(STORAGE_KEY);
        var theme;
        
        if (saved === 'dark' || saved === 'light') {
          // Explicit theme preference
          theme = saved;
        } else {
          // 'system' or no preference: follow OS
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            theme = 'light';
          } else {
            theme = 'dark';
          }
        }
        
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
