<!DOCTYPE html>
<html>
<head>
    <title>GEARX PROTECTED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #0f0; padding: 30px; text-align: center; box-shadow: 0 0 20px #0f0; background: rgba(0,20,0,0.9); width: 80%; max-width: 300px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 100%; box-sizing: border-box; margin: 15px 0; outline: none; text-align: center; font-size: 16px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div id="root">
        <div class="box">
            <h3>GEARX_SYSTEM_LOCKED</h3>
            <p style="font-size: 10px;">ENTER ACCESS KEY</p>
            <input type="password" id="pass" placeholder="****" autofocus>
            <button onclick="cek()">AUTHENTICATE</button>
        </div>
    </div>

    <script>
        function cek() {
            var p = document.getElementById('pass').value;
            if(p === '1234') { 
                // Simpan status login di browser
                localStorage.setItem('gearx_auth', 'true');
                // Langsung ganti isi halaman tanpa nunggu loading lama
                masukDashboard();
            } else {
                alert('ACCESS DENIED!');
                document.getElementById('pass').value = '';
            }
        }

        function masukDashboard() {
            document.body.style.background = "#fff";
            document.body.innerHTML = '<div style="width:100vw;height:100vh;"><iframe src="/src/index.tsx" style="width:100%;height:100%;border:none;"></iframe></div>';
        }

        // Cek kalau sebelumnya sudah pernah login
        if(localStorage.getItem('gearx_auth') === 'true') {
            masukDashboard();
        }
    </script>
</body>
</html>
